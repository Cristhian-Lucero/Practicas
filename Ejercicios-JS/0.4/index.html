<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <label for="nombre">Nombre: </label>
        <input type="text" id="nombre">  
        <span class="error" id="span1"></span>
    </div>
    <div>
        <label for="edad">Edad: </label>
        <input type="number" id="edad">
        <span class="error" id="span2"></span>
    </div>
    <div>
        <label for="emaill">Email: </label>
        <input type="email" id="emaill">
        <span class="error" id="span3"></span>
    </div>
    <div>
        <label for="contraseña">Contraseña: </label> 
        <input type="password" id="contraseña">
        <span class="error" id="span4"></span>
    </div>
    <div>
        <label for="Ccontraseña">Confirmar contraseña: </label>
        <input type="password" id="Ccontraseña"> 
        <span class="error" id="span5"></span>
    </div>
    <div id="correctos">
        <div id="div1"></div>
        <div id="div2"></div>
        <div id="div3"></div>
        <div id="div4"></div>
        <div id="div5"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
